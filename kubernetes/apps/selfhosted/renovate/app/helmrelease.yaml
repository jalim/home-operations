---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: renovate

  values:
    controllers:
      github:
        type: cronjob
        cronjob:
          schedule: "0 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        containers:
          app:
            image:
              repository: ghcr.io/renovatebot/renovate
              # renovate: depName=ghcr.io/renovatebot/renovate
              tag: latest  # pin to a specific tag+SHA; check https://github.com/renovatebot/renovate/releases
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: github
              RENOVATE_AUTODISCOVER: "true"
              RENOVATE_AUTODISCOVER_FILTER: "jalim/*"
              RENOVATE_PLATFORM_COMMIT: "true"
              NODE_OPTIONS: --max-old-space-size=4096
              RENOVATE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_TOKEN
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

      gitlab:
        type: cronjob
        cronjob:
          schedule: "30 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        containers:
          app:
            image:
              repository: ghcr.io/renovatebot/renovate
              # renovate: depName=ghcr.io/renovatebot/renovate
              tag: latest  # pin to a specific tag+SHA; check https://github.com/renovatebot/renovate/releases
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: gitlab
              RENOVATE_ENDPOINT: https://gitlab.lumu.au/api/v4
              RENOVATE_AUTODISCOVER: "true"
              RENOVATE_AUTODISCOVER_FILTER: "jalim/*"
              NODE_OPTIONS: --max-old-space-size=4096
              RENOVATE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITLAB_TOKEN
              # Needed to fetch github.com presets referenced in per-repo renovate.json configs
              GITHUB_COM_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_TOKEN
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

      webhook:
        type: deployment
        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
        initContainers:
          copy-kubectl:
            image:
              repository: docker.io/bitnami/kubectl
              # renovate: depName=docker.io/bitnami/kubectl
              tag: "1.33.0"
            command:
              - /bin/sh
              - -c
              - cp $(which kubectl) /kubectl/kubectl && chmod +x /kubectl/kubectl
        containers:
          app:
            image:
              repository: docker.io/almir/webhook
              # renovate: depName=docker.io/almir/webhook
              tag: "2.8.2"
            args:
              - --hooks=/hooks/hooks.json
              - --port=9000
              - --template
              - --verbose
            env:
              WEBHOOK_SECRET_GITHUB:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: WEBHOOK_SECRET_GITHUB
              WEBHOOK_SECRET_GITLAB:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: WEBHOOK_SECRET_GITLAB
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9000
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9000
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceAccount:
      renovate-webhook: {}

    service:
      webhook:
        controller: webhook
        ports:
          http:
            port: 9000

    persistence:
      kubectl:
        type: emptyDir
        advancedMounts:
          webhook:
            copy-kubectl:
              - path: /kubectl
            app:
              - path: /kubectl
      webhook-hooks:
        type: configMap
        name: renovate-webhook-hooks
        advancedMounts:
          webhook:
            app:
              - path: /hooks/hooks.json
                subPath: hooks.json
      webhook-scripts:
        type: configMap
        name: renovate-webhook-scripts
        defaultMode: 0755
        advancedMounts:
          webhook:
            app:
              - path: /scripts/trigger.sh
                subPath: trigger.sh

