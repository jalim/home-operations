---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: renovate

  values:
    controllers:
      github:
        type: cronjob
        cronjob:
          schedule: "0 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        # Init container generates a GitHub App installation token and writes it
        # to a shared volume. Open-source Renovate has no native App auth support,
        # so we pre-generate the token the same way the old GHA workflow did.
        initContainers:
          token-generator:
            image:
              repository: python
              tag: 3-alpine
            env:
              APP_ID:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_APP_ID
              PRIVATE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_APP_KEY
              OWNER: jalim
              OUTPUT_FILE: /tmp/github-token/token
            command:
              - python3
              - -c
              - |
                import os, sys, time, json, base64, subprocess, tempfile
                import urllib.request as u

                def b64u(d):
                    if isinstance(d, str): d = d.encode()
                    return base64.urlsafe_b64encode(d).rstrip(b'=').decode()

                app_id = os.environ['APP_ID']
                key    = os.environ['PRIVATE_KEY']
                owner  = os.environ.get('OWNER', 'jalim')
                out    = os.environ.get('OUTPUT_FILE', '/tmp/github-token/token')

                now = int(time.time())
                h = b64u(json.dumps({'alg': 'RS256', 'typ': 'JWT'}, separators=(',', ':')))
                p = b64u(json.dumps({'iat': now-60, 'exp': now+540, 'iss': str(app_id)}, separators=(',', ':')))
                unsigned = f'{h}.{p}'

                kf = tempfile.mktemp(suffix='.pem')
                open(kf, 'w').write(key)
                try:
                    sig = b64u(subprocess.check_output(
                        ['openssl', 'dgst', '-sha256', '-sign', kf, '-'],
                        input=unsigned.encode()
                    ))
                finally:
                    os.unlink(kf)

                jwt = f'{unsigned}.{sig}'

                def gh(url, method='GET'):
                    req = u.Request(url, method=method, headers={
                        'Authorization': f'Bearer {jwt}',
                        'Accept': 'application/vnd.github+json',
                        'X-GitHub-Api-Version': '2022-11-28',
                    })
                    with u.urlopen(req) as r: return json.loads(r.read())

                insts   = gh('https://api.github.com/app/installations')
                inst_id = next(i['id'] for i in insts if i['account']['login'].lower() == owner.lower())
                token   = gh(f'https://api.github.com/app/installations/{inst_id}/access_tokens', method='POST')['token']

                os.makedirs(os.path.dirname(out), exist_ok=True)
                open(out, 'w').write(token)
                print('GitHub App installation token written successfully', file=sys.stderr)

        containers:
          app:
            image:
              repository: ghcr.io/renovatebot/renovate
              # renovate: depName=ghcr.io/renovatebot/renovate
              tag: latest  # pin to a specific tag+SHA; check https://github.com/renovatebot/renovate/releases
            # Read the token generated by the init container
            command:
              - sh
              - -c
              - RENOVATE_TOKEN=$(cat /tmp/github-token/token) exec renovate
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: github
              RENOVATE_AUTODISCOVER: "true"
              RENOVATE_AUTODISCOVER_FILTER: "jalim/*"
              RENOVATE_PLATFORM_COMMIT: "true"
              NODE_OPTIONS: --max-old-space-size=4096
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

      gitlab:
        type: cronjob
        cronjob:
          schedule: "30 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        containers:
          app:
            image:
              repository: ghcr.io/renovatebot/renovate
              # renovate: depName=ghcr.io/renovatebot/renovate
              tag: latest  # pin to a specific tag+SHA; check https://github.com/renovatebot/renovate/releases
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: gitlab
              RENOVATE_ENDPOINT: https://gitlab.lumu.au/api/v4
              RENOVATE_AUTODISCOVER: "true"
              RENOVATE_AUTODISCOVER_FILTER: "jalim/*"
              NODE_OPTIONS: --max-old-space-size=4096
              RENOVATE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITLAB_TOKEN
              # Needed to fetch github.com presets referenced in per-repo renovate.json configs
              GITHUB_COM_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_TOKEN
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      github-token:
        type: emptyDir
        advancedMounts:
          github:
            token-generator:
              - path: /tmp/github-token
            app:
              - path: /tmp/github-token
                readOnly: true
