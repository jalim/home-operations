---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: renovate

  values:
    controllers:
      github:
        type: cronjob
        cronjob:
          schedule: "0 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        containers:
          app:
            image:
              repository: ghcr.io/renovatebot/renovate
              # renovate: depName=ghcr.io/renovatebot/renovate
              tag: latest  # pin to a specific tag+SHA; check https://github.com/renovatebot/renovate/releases
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: github
              RENOVATE_AUTODISCOVER: "true"
              RENOVATE_AUTODISCOVER_FILTER: "jalim/*"
              RENOVATE_PLATFORM_COMMIT: "true"
              NODE_OPTIONS: --max-old-space-size=4096
              RENOVATE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_TOKEN
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

      gitlab:
        type: cronjob
        cronjob:
          schedule: "30 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        containers:
          app:
            image:
              repository: ghcr.io/renovatebot/renovate
              # renovate: depName=ghcr.io/renovatebot/renovate
              tag: latest  # pin to a specific tag+SHA; check https://github.com/renovatebot/renovate/releases
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: gitlab
              RENOVATE_ENDPOINT: https://gitlab.lumu.au/api/v4
              RENOVATE_AUTODISCOVER: "true"
              RENOVATE_AUTODISCOVER_FILTER: "jalim/*"
              NODE_OPTIONS: --max-old-space-size=4096
              RENOVATE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITLAB_TOKEN
              # Needed to fetch github.com presets referenced in per-repo renovate.json configs
              GITHUB_COM_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_TOKEN
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

      forgejo:
        type: cronjob
        cronjob:
          schedule: "15 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        containers:
          app:
            image:
              repository: ghcr.io/renovatebot/renovate
              # renovate: depName=ghcr.io/renovatebot/renovate
              tag: latest  # pin to a specific tag+SHA; check https://github.com/renovatebot/renovate/releases
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: gitea
              RENOVATE_ENDPOINT: https://git.lumu.au
              RENOVATE_AUTODISCOVER: "true"
              RENOVATE_AUTODISCOVER_FILTER: "luke/*"
              NODE_EXTRA_CA_CERTS: /etc/ssl/certs/lumu-ca.crt
              NODE_OPTIONS: --max-old-space-size=4096
              RENOVATE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_FORGEJO_TOKEN
              # Needed to fetch github.com presets referenced in per-repo renovate.json configs
              GITHUB_COM_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: renovate-secret
                    key: RENOVATE_GITHUB_TOKEN
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

    persistence:
      lumu-ca:
        type: configMap
        name: lumu-ca-bundle
        advancedMounts:
          forgejo:
            app:
              - path: /etc/ssl/certs/lumu-ca.crt
                subPath: ca-bundle.crt
                readOnly: true

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch


