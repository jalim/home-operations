---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleseerr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: teleseerr
  values:
    controllers:
      teleseerr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/chimpanzeesweetrolls/overseerrrequestviatelegrambot
              tag: v4.0.0@sha256:58a93f90a1debe3fafbc8055d0f1a59ec9902ed5129cf6082d80765bbaf6e911
            env:
              TZ: Australia/Perth
              OVERSEERR_API_URL: http://seerr.default.svc.cluster.local/api/v1
            envFrom:
              - secretRef:
                  name: teleseerr-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
    persistence:
      data:
        existingClaim: teleseerr
        globalMounts:
          - path: /app/data
