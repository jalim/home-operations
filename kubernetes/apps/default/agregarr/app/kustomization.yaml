---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml

configMapGenerator:
  - name: agregarr-maintainerr-patch
    namespace: default
    # TEMPORARY PATCH — remove once agregarr/agregarr#569 is merged and released.
    #
    # agregarr v2.4.2 calls GET /api/collections for overlay data, but Maintainerr
    # intentionally limits that endpoint to 2 preview items per collection. This patch
    # overrides maintainerr.js to call GET /api/collections/overlay-data instead, which
    # returns the full media list. Falls back to /api/collections for Maintainerr < 3.4.0.
    #
    # Cleanup: remove this configMapGenerator block, the maintainerr-patch/ directory,
    # and the maintainerr-patch persistence mount in helmrelease.yaml.
    files:
      - maintainerr-patch/maintainerr.js
    options:
      disableNameSuffixHash: true
