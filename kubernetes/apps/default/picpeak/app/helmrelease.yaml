---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: picpeak
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: picpeak
  values:
    controllers:
      picpeak:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
        containers:
          frontend:
            image:
              repository: ghcr.io/the-luap/picpeak/frontend
              tag: stable@sha256:3f47eb972dc986ff4f30e40be85b0416da64e30902e991caadcf2e8296875fff
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
          backend:
            image:
              repository: ghcr.io/the-luap/picpeak/backend
              tag: stable@sha256:4256a0ed98966c1a78eb54a89768bf87a65466b762fa735f1d4eb6af553b98dc
            env:
              NODE_ENV: production
              DATABASE_CLIENT: pg
              DB_HOST: picpeak-postgres
              DB_USER: picpeak
              DB_NAME: picpeak
              APP_DATA: /app/data
              APP_STORAGE: /app/storage
              STORAGE_PATH: /app/storage
              FRONTEND_URL: https://picpeak.lumu.au
              API_URL: https://picpeak.lumu.au/api
              REDIS_URL: redis://picpeak-redis:6379
              SMTP_HOST: smtp-relay
              SMTP_PORT: "25"
              SMTP_SECURE: "false"
              EMAIL_FROM: picpeak@lumu.au
              TZ: Australia/Perth
            envFrom:
              - secretRef:
                  name: picpeak-secret
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

      postgres:
        pod:
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: picpeak
                      app.kubernetes.io/controller: picpeak
                  topologyKey: kubernetes.io/hostname
        containers:
          postgres:
            image:
              repository: docker.io/library/postgres
              tag: 18-alpine
            env:
              POSTGRES_USER: picpeak
              POSTGRES_DB: picpeak
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: picpeak-secret
                    key: DB_PASSWORD
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

      redis:
        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
        containers:
          redis:
            image:
              repository: docker.io/valkey/valkey
              tag: 8-alpine@sha256:b027235326507cfdade9b6684056ec1d0b0c0757412e628245129b5d7b788618
            args:
              - --save
              - ""
              - --appendonly
              - "no"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi

    service:
      app:
        controller: picpeak
        ports:
          http:
            port: &port 80
      postgres:
        controller: postgres
        ports:
          http:
            port: 5432
      redis:
        controller: redis
        ports:
          http:
            port: 6379

    route:
      app:
        hostnames: ["picpeak.lumu.au"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      data:
        existingClaim: picpeak
        advancedMounts:
          picpeak:
            backend:
              - path: /app/data
                subPath: data
              - path: /app/storage
                subPath: storage
          postgres:
            postgres:
              - path: /var/lib/postgresql
                subPath: postgres-18-home
      nginx-config:
        type: configMap
        name: picpeak-nginx-config
        advancedMounts:
          picpeak:
            frontend:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
      logs:
        type: emptyDir
        advancedMounts:
          picpeak:
            backend:
              - path: /app/logs
      nginx-cache:
        type: emptyDir
        advancedMounts:
          picpeak:
            frontend:
              - path: /var/cache/nginx
      nginx-run:
        type: emptyDir
        advancedMounts:
          picpeak:
            frontend:
              - path: /var/run
      tmp:
        type: emptyDir
        advancedMounts:
          picpeak:
            frontend:
              - path: /tmp
            backend:
              - path: /tmp
