---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: booklore-mariadb
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: booklore-mariadb
  values:
    auth:
      database: booklore
      username: booklore
      existingSecret: booklore-secret
      existingSecretPasswordKey: mariadb_password
      existingSecretRootPasswordKey: mariadb-root-password
    primary:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      persistence:
        enabled: true
        size: 4Gi
