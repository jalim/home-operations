---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: grimmory
  dependsOn:
    - name: grimmory-mariadb
  values:
    controllers:
      grimmory:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-mariadb:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args:
              - mysql
              - "grimmory:$(DB_PASSWORD)@tcp(grimmory-mariadb:3306)/grimmory"
            env:
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory-secret
                    key: mariadb_password
        containers:
          app:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v0.38.2
            env:
              DATABASE_URL: jdbc:mariadb://grimmory-mariadb:3306/grimmory
              DATABASE_USERNAME: grimmory
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory-secret
                    key: mariadb_password
              USER_ID: "1000"
              GROUP_ID: "1000"
              TZ: Australia/Perth
              SWAGGER_ENABLED: "false"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["grimmory.lumu.au"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: grimmory
        advancedMounts:
          grimmory:
            app:
              - path: /app/data
      books:
        existingClaim: media
        advancedMounts:
          grimmory:
            app:
              - path: /books
                subPath: books
      bookdrop:
        type: emptyDir
        advancedMounts:
          grimmory:
            app:
              - path: /bookdrop
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 100Mi
        advancedMounts:
          grimmory:
            app:
              - path: /tmp
