---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: globalping-probe
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: globalping-probe

  values:
    controllers:
      globalping-probe:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: globalping/globalping-probe
              tag: 0.48.0@sha256:109cfd26635da57bcc94b3608d5abe2205e1d0b63e6cc6487a7846ece827e11a
            envFrom:
              - secretRef:
                  name: globalping-probe-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              capabilities:
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        seccompProfile:
          type: Unconfined
