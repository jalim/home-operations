plex:
  url: env
  token: env
  timeout: 60

tmdb:
  apikey: <<TMDB_APIKEY>>
  language: en

libraries:
  Movies:
    collection_files:
      # Cinematic universes — MCU, DCU, etc. (runs first to populate plex:// GUID→TMDb ID cache)
      - default: universe
      # Franchise collections — Harry Potter, Lord of the Rings, Star Wars, etc.
      # Must run after universe so the plex://movie/ GUID cache is populated
      - default: franchise
    settings:
      asset_directory: /config/assets
