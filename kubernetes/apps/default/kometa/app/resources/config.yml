plex:
  url: env
  token: env
  timeout: 60

tmdb:
  apikey: <<TMDB_APIKEY>>
  language: en

libraries:
  Movies:
    collection_files:
      # Cinematic universes — MCU, DCU, etc. (runs first to populate plex:// GUID→TMDb ID cache)
      - default: universe
      # Franchise collections — Harry Potter, Lord of the Rings, Star Wars, etc.
      # Use a local TMDb dynamic collection file instead of the built-in default,
      # which is currently failing in the pinned Kometa image.
      - file: /config/franchise.yml
    settings:
      asset_directory: /config/assets
