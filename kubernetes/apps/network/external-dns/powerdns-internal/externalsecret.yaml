---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-powerdns-internal
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: external-dns-powerdns-internal-secret
    template:
      engineVersion: v2
      data:
        api_key: "{{ .api_key }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: PowerDNS
        property: internal-api-key
