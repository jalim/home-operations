---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lumu-zerossl
spec:
  secretName: lumu-zerossl-tls
  issuerRef:
    name: zerossl-production
    kind: ClusterIssuer
  commonName: lumu.au
  dnsNames:
    - lumu.au
    - "*.lumu.au"
  renewBefore: 720h
  privateKey:
    rotationPolicy: Never
