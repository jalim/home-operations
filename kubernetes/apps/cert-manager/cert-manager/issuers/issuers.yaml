---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: luke@mullan.net.au
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cloudflare:
            email: luke@mullan.net.au
            apiTokenSecretRef:
              name: cloudflare-secret
              key: CLOUDFLARE_API_KEY
        selector:
          dnsZones:
            - lumu.au
            - mullan.net.au
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zerossl-production
spec:
  acme:
    server: https://acme.zerossl.com/v2/DV90
    email: luke@mullan.net.au
    privateKeySecretRef:
      name: zerossl-production
    externalAccountBinding:
      # Non-sensitive EAB Key ID from ZeroSSL dashboard (Developer > EAB Credentials)
      keyID: qji18vfwbu748ad8eYC-Hg
      keySecretRef:
        name: zerossl-eab-secret
        key: ZEROSSL_EAB_HMAC_KEY
    solvers:
      - dns01:
          cloudflare:
            email: luke@mullan.net.au
            apiTokenSecretRef:
              name: cloudflare-secret
              key: CLOUDFLARE_API_KEY
        selector:
          dnsZones:
            - lumu.au
            - mullan.net.au
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: luke@mullan.net.au
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - dns01:
          cloudflare:
            email: luke@mullan.net.au
            apiTokenSecretRef:
              name: cloudflare-secret
              key: CLOUDFLARE_API_KEY
        selector:
          dnsZones:
            - lumu.au
            - mullan.net.au
