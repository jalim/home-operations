---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
    - secretRef:
        name: openclaw-media-secrets
  env:
    - name: RADARR_URL
      value: "https://radarr.lumu.au"
    - name: SONARR_URL
      value: "https://sonarr.lumu.au"
  runtimeDeps:
    python: true
  gateway:
    controlUiOrigins:
      - "https://openclaw.lumu.au"
  config:
    raw:
      gateway:
        controlUi:
          dangerouslyDisableDeviceAuth: true
      agents:
        defaults:
          model:
            primary: "anthropic/claude-sonnet-4-20250514"
      skills:
        load:
          extraDirs:
            - "/home/openclaw/.openclaw/skills"
  storage:
    persistence:
      enabled: true
      size: 10Gi
