---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-media-secrets
  env:
    - name: RADARR_URL
      value: "https://radarr.lumu.au"
    - name: SONARR_URL
      value: "https://sonarr.lumu.au"
  runtimeDeps:
    python: true
  gateway:
    controlUiOrigins:
      - "https://openclaw.lumu.au"
  sidecars:
    - name: device-auto-approver
      image: ghcr.io/openclaw/openclaw:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            COUNT=$(openclaw devices list --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('pending',[])))" 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ] 2>/dev/null; then
              openclaw devices approve --latest 2>&1 && echo "Auto-approved a device at $(date)"
            fi
            sleep 3
          done
      env:
        - name: HOME
          value: /home/openclaw
      volumeMounts:
        - name: data
          mountPath: /home/openclaw/.openclaw
  config:
    raw:
      agents:
        defaults:
          model:
            primary: "anthropic/claude-sonnet-4-20250514"
      skills:
        load:
          extraDirs:
            - "/home/openclaw/.openclaw/skills"
  storage:
    persistence:
      enabled: true
      size: 10Gi
