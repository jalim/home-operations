---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-allow-envoy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
      ports:
        - protocol: TCP
          port: 18790
---
# Cross-node Envoy traffic gets SNATed to the node IP, which Cilium identifies
# as kube-apiserver (control plane nodes). This CiliumNetworkPolicy allows
# remote-node masqueraded traffic to reach the gateway-proxy port.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-allow-remote-node
  namespace: openclaw
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/name: openclaw
  ingress:
    - fromEntities:
        - remote-node
      toPorts:
        - ports:
            - port: "18790"
              protocol: TCP
